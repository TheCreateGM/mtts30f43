PACKAGE_NAME="mtt-s30"
PACKAGE_VERSION="1.1.1"

# Build command — DKMS copies source to build dir, Makefile is at root of that dir
MAKE[0]="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"

CLEAN="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

BUILT_MODULE_NAME[0]="sgpu_km"
BUILT_MODULE_LOCATION[0]=""
DEST_MODULE_LOCATION[0]="/kernel/drivers/gpu/drm/mtt/"

BUILT_MODULE_NAME[1]="mtgpu_stub"
BUILT_MODULE_LOCATION[1]=""
DEST_MODULE_LOCATION[1]="/kernel/drivers/gpu/drm/mtt/"

AUTOINSTALL="yes"
